services:
  # ─── BACKEND (FastAPI) ───────────────────────────────────────────────────────
  - type: web
    name: chatreeo-api
    runtime: python
    rootDir: chatreeo-backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: FRONTEND_URL
        sync: false
