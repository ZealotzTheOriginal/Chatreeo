services:
  # ─── BACKEND (FastAPI) ───────────────────────────────────────────────────────
  - type: web
    name: chatreeo-api
    runtime: python
    rootDir: chatreeo-backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: DEEPSEEK_API_KEY
        sync: false

      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false

      - key: FRONTEND_URL
        sync: false

  # ─── FRONTEND (Angular) ──────────────────────────────────────────────────────
  - type: static
    name: chatreeo-app
    rootDir: chatreeo-angular
    buildCommand: bash render-build.sh
    staticPublishPath: dist/chatreeo-angular/browser
    pullRequestPreviewsEnabled: false
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: API_URL
        sync: false   # ej: https://chatreeo-api.onrender.com

      - key: FIREBASE_API_KEY
        sync: false
      - key: FIREBASE_AUTH_DOMAIN
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_STORAGE_BUCKET
        sync: false
      - key: FIREBASE_MESSAGING_SENDER_ID
        sync: false
      - key: FIREBASE_APP_ID
        sync: false
